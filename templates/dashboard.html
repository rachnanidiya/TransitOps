<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TransitOps Dashboard</title>
    <!-- Tailwind CSS CDN for rapid, clean design styling -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 text-gray-900 font-sans antialiased">
    <!-- Main Container -->
    <div class="flex min-h-screen">
      <!-- Sidebar Navigation Element -->
      <aside class="w-64 bg-slate-900 text-white flex flex-col p-6 space-y-6">
        <div
          class="text-xl font-bold border-b border-slate-700 pb-4 text-blue-400"
        >
          TransitOps
        </div>
        <nav class="flex-1 space-y-2">
          <a
            href="#"
            class="block py-2.5 px-4 rounded bg-slate-800 text-white font-medium"
            >Dashboard</a
          >
          <a
            href="#"
            class="block py-2.5 px-4 rounded text-slate-400 hover:bg-slate-800 hover:text-white transition"
            >Vehicles</a
          >
          <a
            href="#"
            class="block py-2.5 px-4 rounded text-slate-400 hover:bg-slate-800 hover:text-white transition"
            >Drivers</a
          >
          <a
            href="#"
            class="block py-2.5 px-4 rounded text-slate-400 hover:bg-slate-800 hover:text-white transition"
            >Trips</a
          >
        </nav>
        <div class="text-xs text-slate-500">Role: Fleet Manager</div>
      </aside>

      <!-- Main Workspace -->
      <main class="flex-1 p-10">
        <!-- Header Row -->
        <div class="flex justify-between items-center mb-8">
          <div>
            <h1 class="text-3xl font-bold tracking-tight">Fleet Dashboard</h1>
            <p class="text-sm text-gray-500">
              Real-time logistics and dispatch overview.
            </p>
          </div>
          <!-- Action Button to Trigger Registration Popup Modal -->
          <button
            onclick="toggleModal(true)"
            class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-5 rounded-lg shadow transition"
          >
            + Register Vehicle
          </button>
        </div>

        <!-- Mandatory KPI Cards Row -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
          <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
            <p
              class="text-sm font-medium text-gray-500 uppercase tracking-wider"
            >
              Active Vehicles
            </p>
            <p class="text-3xl font-bold mt-2 text-slate-800">12</p>
          </div>
          <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
            <p
              class="text-sm font-medium text-gray-500 uppercase tracking-wider"
            >
              Available Vehicles
            </p>
            <p class="text-3xl font-bold mt-2 text-green-600">5</p>
          </div>
          <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
            <p
              class="text-sm font-medium text-gray-500 uppercase tracking-wider"
            >
              In Shop
            </p>
            <p class="text-3xl font-bold mt-2 text-amber-600">2</p>
          </div>
          <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
            <p
              class="text-sm font-medium text-gray-500 uppercase tracking-wider"
            >
              Active Trips
            </p>
            <p class="text-3xl font-bold mt-2 text-blue-600">8</p>
          </div>
        </div>
      </main>
    </div>

    <!-- Hidden Dialog Overlay Modal for Vehicle Data Entry -->
    <div
      id="registrationModal"
      class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden flex items-center justify-center p-4"
    >
      <div
        class="bg-white rounded-xl shadow-xl border border-gray-200 max-w-md w-full overflow-hidden"
      >
        <div
          class="p-6 border-b border-gray-100 flex justify-between items-center"
        >
          <h3 class="text-xl font-bold text-slate-900">Register New Vehicle</h3>
          <button
            onclick="toggleModal(false)"
            class="text-gray-400 text-xl font-bold hover:text-gray-600"
          >
            &times;
          </button>
        </div>

        <!-- This form submission routes data straight to our backend endpoint -->
        <form action="/add-vehicle" method="POST" class="p-6 space-y-4">
          <div>
            <label
              class="block text-xs font-bold uppercase text-gray-500 mb-2 tracking-wide"
              >Registration Number (Unique)</label
            >
            <input
              type="text"
              name="reg_number"
              required
              placeholder="e.g. GJ-01-XX-1234"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none"
            />
          </div>
          <div>
            <label
              class="block text-xs font-bold uppercase text-gray-500 mb-2 tracking-wide"
              >Vehicle Model Name</label
            >
            <input
              type="text"
              name="model_name"
              required
              placeholder="e.g. Tata Ace Gold"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none"
            />
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label
                class="block text-xs font-bold uppercase text-gray-500 mb-2 tracking-wide"
                >Max Capacity (kg)</label
              >
              <input
                type="number"
                name="capacity"
                required
                placeholder="500"
                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none"
              />
            </div>
            <div>
              <label
                class="block text-xs font-bold uppercase text-gray-500 mb-2 tracking-wide"
                >Odometer (km)</label
              >
              <input
                type="number"
                name="odometer"
                required
                placeholder="12000"
                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none"
              />
            </div>
          </div>
          <div class="pt-4 border-t border-gray-100 flex justify-end space-x-3">
            <button
              type="button"
              onclick="toggleModal(false)"
              class="px-4 py-2.5 border border-gray-300 text-gray-700 font-medium rounded-lg hover:bg-gray-50 transition"
            >
              Cancel
            </button>
            <button
              type="submit"
              class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg shadow transition"
            >
              Save Vehicle
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- UI Toggle Scripting -->
    <script>
      function toggleModal(show) {
        const modal = document.getElementById("registrationModal");
        if (show) {
          modal.classList.remove("hidden");
        } else {
          modal.classList.add("hidden");
        }
      }
    </script>
  </body>
</html>
